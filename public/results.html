<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Facilitator Results — Think Beyond the Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body class="results-page">
<main class="app">

  <section id="screen-lock" class="screen active">
    <div class="card lock-card">
      <p class="eyebrow">Think Beyond the Game</p>
      <h1>Facilitator results</h1>
      <p class="sub">Enter the shared password to view student results.</p>
      <form id="lock-form" novalidate>
        <label for="password">Password</label>
        <input id="password" type="password" required autocomplete="current-password">
        <p class="error-text" id="lock-error">Incorrect password.</p>
        <button type="submit" class="btn-primary">View results</button>
      </form>
    </div>
  </section>

  <section id="screen-data" class="screen">
    <div class="card">
      <p class="eyebrow">Think Beyond the Game</p>
      <h1>Facilitator results</h1>
      <p class="sub">Every submission, and where the group is landing.</p>

      <div class="summary-grid" id="summary-grid"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Student</th>
              <th>Top role</th>
              <th>Second role</th>
              <th>Submitted</th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
      </div>
      <p class="empty-state" id="empty-state">No submissions yet.</p>
    </div>
  </section>

</main>
<script src="/results.js"></script>
</body>
</html>
